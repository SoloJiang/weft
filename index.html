<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/weft-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weft</title>
    <script>
      // Apply the theme before first paint to avoid a flash of the wrong theme.
      // Explicit "dark"/"light" pin; "system" or no saved value follow the OS.
      (function () {
        try {
          var k = localStorage.getItem("weft-theme");
          var t =
            k === "dark" || k === "light"
              ? k
              : matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
