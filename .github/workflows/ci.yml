name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Harden cargo's network layer against transient crates.io download flakes.
# `cargo` intermittently fails registry downloads with
# `curl failed: [16] Error in the HTTP2 framing layer`; disabling HTTP/2
# multiplexing forces HTTP/1.1 and avoids that framing error, and a higher
# retry count rides out brief blips.
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  lint-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whitespace errors
        run: git diff --check origin/${{ github.base_ref }}...HEAD

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type-check and build frontend
        run: pnpm build

  rust-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'macos-latest'
            args: ''
          # Pinned to windows-2022 (not windows-latest): the windows-2025-vs2026
          # image crashes the test binary at load with STATUS_ENTRYPOINT_NOT_FOUND
          # (0xc0000139) even though every DLL the exe imports resolves cleanly —
          # an image/SDK regression, not our code. Revisit when the 2025 image
          # stabilizes.
          - platform: 'windows-2022'
            args: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            protobuf-compiler
          protoc --version

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          protoc --version

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install -e --id Google.Protobuf --accept-package-agreements --accept-source-agreements
          $protoc = Get-Command protoc -ErrorAction SilentlyContinue
          if ($protoc) {
            $protocPath = $protoc.Source
          } else {
            $installed = Get-ChildItem -Path "$env:LOCALAPPDATA\Microsoft\WinGet\Packages" -Filter protoc.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $installed) {
              throw "protoc.exe not found after winget install"
            }
            $protocPath = $installed.FullName
          }
          & $protocPath --version
          # Supply protoc to prost-build via $PROTOC rather than prepending the
          # WinGet package dir to PATH — cleaner, and keeps the runtime DLL search
          # path uncluttered.
          "PROTOC=$protocPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
