name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Harden cargo's network layer against transient crates.io download flakes.
# `cargo` intermittently fails registry downloads with
# `curl failed: [16] Error in the HTTP2 framing layer`; disabling HTTP/2
# multiplexing forces HTTP/1.1 and avoids that framing error, and a higher
# retry count rides out brief blips.
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  lint-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whitespace errors
        run: git diff --check origin/${{ github.base_ref }}...HEAD

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type-check and build frontend
        run: pnpm build

  rust-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'macos-latest'
            args: ''
          # Windows (windows-2022) is temporarily removed from CI: the git-subprocess
          # test helpers (planner/materialize/skills) flake on the GitHub Windows
          # runner — `git init` intermittently fails or HANGS, panicking or deadlocking
          # the test step. It's pre-existing infra flakiness unrelated to product code
          # (Linux + macOS run the full suite green). Re-add this entry once the Windows
          # test infra is stabilized; the Windows-specific steps below are kept ready.
          # - platform: 'windows-2022'
          #   args: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            protobuf-compiler
          protoc --version

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          protoc --version

      # winget (used previously) ships only with windows-latest/Server 2025, not
      # windows-2022, so install protoc via the dedicated action — it works on
      # every image and adds protoc (with its include dir) to PATH for prost-build.
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify protoc (Windows)
        if: runner.os == 'Windows'
        run: protoc --version

      - name: Run Rust tests
        if: runner.os != 'Windows'
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # On Windows the cargo test-harness binaries get no application manifest
      # (tauri-build only manifests the app bin), so rfd's static import of the
      # Common-Controls-v6-only comctl32!TaskDialogIndirect can't resolve and the
      # exe dies at load with STATUS_ENTRYPOINT_NOT_FOUND. Build the test binaries
      # first, drop an external <exe>.manifest beside each (the loader honors it
      # for exes with no embedded manifest, redirecting comctl32 to v6), then run.
      - name: Run Rust tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\SideBySide" /v PreferExternalManifest /t REG_DWORD /d 1 /f | Out-Null
          $exes = cargo test --no-run --manifest-path src-tauri/Cargo.toml --message-format=json |
            ForEach-Object { try { $o = $_ | ConvertFrom-Json } catch { return }; if ($o.executable) { $o.executable } } |
            Where-Object { $_ }
          foreach ($exe in $exes) {
            Copy-Item -Path src-tauri/tests.manifest -Destination "$exe.manifest" -Force
            Write-Host "external manifest -> $exe.manifest"
          }
          cargo test --manifest-path src-tauri/Cargo.toml
