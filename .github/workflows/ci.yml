name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Harden cargo's network layer against transient crates.io download flakes.
# `cargo` intermittently fails registry downloads with
# `curl failed: [16] Error in the HTTP2 framing layer`; disabling HTTP/2
# multiplexing forces HTTP/1.1 and avoids that framing error, and a higher
# retry count rides out brief blips.
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  lint-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whitespace errors
        run: git diff --check origin/${{ github.base_ref }}...HEAD

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type-check and build frontend
        run: pnpm build

  rust-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'macos-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            protobuf-compiler
          protoc --version

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          protoc --version

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install -e --id Google.Protobuf --accept-package-agreements --accept-source-agreements
          $protoc = Get-Command protoc -ErrorAction SilentlyContinue
          if ($protoc) {
            $protocPath = $protoc.Source
          } else {
            $installed = Get-ChildItem -Path "$env:LOCALAPPDATA\Microsoft\WinGet\Packages" -Filter protoc.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $installed) {
              throw "protoc.exe not found after winget install"
            }
            $protocPath = $installed.FullName
          }
          & $protocPath --version
          # Supply protoc to prost-build via $PROTOC rather than prepending the
          # WinGet package dir to PATH — cleaner, and keeps the runtime DLL search
          # path uncluttered.
          "PROTOC=$protocPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Windows test-binary diagnostics
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          # Build the test binaries (no run) and capture their paths from cargo's
          # JSON output so we can inspect the exact exe that crashes at load.
          $exes = cargo test --no-run --manifest-path src-tauri/Cargo.toml --message-format=json 2>$null |
            ForEach-Object { try { $o = $_ | ConvertFrom-Json } catch { return }; if ($o.executable) { $o.executable } } |
            Where-Object { $_ }
          Write-Host "=== test executables ==="
          $exes | ForEach-Object { Write-Host $_ }

          # Locate dumpbin from the installed MSVC toolset.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = $null
          if (Test-Path $vswhere) {
            $vsPath = & $vswhere -latest -property installationPath
            $dumpbin = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Filter dumpbin.exe -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match 'Hostx64\\x64' } | Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Host "dumpbin: $dumpbin"

          # lucasg Dependencies CLI explicitly flags missing import entry points.
          $depDir = "$env:RUNNER_TEMP\deptool"
          $depCli = $null
          try {
            Invoke-WebRequest -Uri "https://github.com/lucasg/Dependencies/releases/download/v1.11.1/Dependencies_x64_Release.zip" -OutFile "$env:RUNNER_TEMP\deps.zip"
            Expand-Archive -Path "$env:RUNNER_TEMP\deps.zip" -DestinationPath $depDir -Force
            $depCli = Join-Path $depDir 'Dependencies.exe'
          } catch { Write-Host "Dependencies download failed: $_" }

          foreach ($exe in $exes) {
            Write-Host "########## $exe ##########"
            if ($dumpbin) {
              Write-Host "----- dumpbin /dependents -----"
              & $dumpbin /dependents $exe
            }
            if ($depCli -and (Test-Path $depCli)) {
              Write-Host "----- Dependencies -chain (missing entry points) -----"
              & $depCli -depth 2 -chain $exe 2>&1 |
                Select-String -Pattern "Missing|NOT_FOUND|not found|\[-\]|0xc0000139|entrypoint|ordinal"
            }
            Write-Host "----- direct run -----"
            & $exe --list 2>&1 | Out-String | Write-Host
            Write-Host "exit code: $LASTEXITCODE"
          }

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
