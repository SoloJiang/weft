name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Harden cargo's network layer against transient crates.io download flakes.
# `cargo` intermittently fails registry downloads with
# `curl failed: [16] Error in the HTTP2 framing layer`; disabling HTTP/2
# multiplexing forces HTTP/1.1 and avoids that framing error, and a higher
# retry count rides out brief blips.
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  lint-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whitespace errors
        run: git diff --check origin/${{ github.base_ref }}...HEAD

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type-check and build frontend
        run: pnpm build

  rust-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'macos-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            protobuf-compiler
          protoc --version

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          protoc --version

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install -e --id Google.Protobuf --accept-package-agreements --accept-source-agreements
          $protoc = Get-Command protoc -ErrorAction SilentlyContinue
          if ($protoc) {
            $protocPath = $protoc.Source
          } else {
            $installed = Get-ChildItem -Path "$env:LOCALAPPDATA\Microsoft\WinGet\Packages" -Filter protoc.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $installed) {
              throw "protoc.exe not found after winget install"
            }
            $protocPath = $installed.FullName
          }
          & $protocPath --version
          # Supply protoc to prost-build via $PROTOC instead of prepending the
          # WinGet package dir to PATH. That dir ships its own DLLs (abseil, etc.)
          # which would otherwise land on the runtime DLL search path and can
          # shadow the C-runtime / crypto DLLs the test exe loads, crashing it at
          # startup with STATUS_ENTRYPOINT_NOT_FOUND (0xc0000139).
          "PROTOC=$protocPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Windows protoc package contents (diagnostic)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          $dir = Split-Path -Parent $env:PROTOC
          Write-Host "protoc dir: $dir"
          Get-ChildItem -Path $dir -Filter *.dll -ErrorAction SilentlyContinue | Select-Object Name, Length

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
