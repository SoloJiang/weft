name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Harden cargo's network layer against transient crates.io download flakes.
# `cargo` intermittently fails registry downloads with
# `curl failed: [16] Error in the HTTP2 framing layer`; disabling HTTP/2
# multiplexing forces HTTP/1.1 and avoids that framing error, and a higher
# retry count rides out brief blips.
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  lint-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whitespace errors
        run: git diff --check origin/${{ github.base_ref }}...HEAD

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type-check and build frontend
        run: pnpm build

  rust-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'macos-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            protobuf-compiler
          protoc --version

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          protoc --version

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install -e --id Google.Protobuf --accept-package-agreements --accept-source-agreements
          $protoc = Get-Command protoc -ErrorAction SilentlyContinue
          if ($protoc) {
            $protocPath = $protoc.Source
          } else {
            $installed = Get-ChildItem -Path "$env:LOCALAPPDATA\Microsoft\WinGet\Packages" -Filter protoc.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $installed) {
              throw "protoc.exe not found after winget install"
            }
            $protocPath = $installed.FullName
          }
          & $protocPath --version
          # Supply protoc to prost-build via $PROTOC rather than prepending the
          # WinGet package dir to PATH — cleaner, and keeps the runtime DLL search
          # path uncluttered.
          "PROTOC=$protocPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Windows test-binary diagnostics
        if: runner.os == 'Windows'
        continue-on-error: true
        timeout-minutes: 30
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          # STATIC analysis only — never execute the crashing exe (that blocks on a
          # modal "entry point not found" loader dialog) and never recurse the
          # import tree. dumpbin /dependents + /imports + /exports of the suspect
          # runtime DLLs is enough to pinpoint the missing entry point from the log.
          $exes = cargo test --no-run --manifest-path src-tauri/Cargo.toml --message-format=json 2>$null |
            ForEach-Object { try { $o = $_ | ConvertFrom-Json } catch { return }; if ($o.executable) { $o.executable } } |
            Where-Object { $_ }
          Write-Host "=== test executables ==="
          $exes | ForEach-Object { Write-Host $_ }

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $dumpbin = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Filter dumpbin.exe -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'Hostx64\\x64' } | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "dumpbin: $dumpbin"

          # Inspect the lib unittest exe (weft-<hash>.exe) — the one that crashes.
          $libExe = $exes | Where-Object { (Split-Path -Leaf $_) -match '^weft-[0-9a-f]+\.exe$' } | Select-Object -First 1
          if (-not $libExe) { $libExe = $exes | Select-Object -First 1 }
          Write-Host "########## inspecting: $libExe ##########"

          # Parse the exe's imports into { dll -> [funcs] }.
          $imports = @{}
          $cur = $null
          foreach ($line in (& $dumpbin /imports $libExe)) {
            if ($line -match '^\s{4}([A-Za-z0-9_.-]+\.dll)\s*$') {
              $cur = $matches[1].ToLower(); if (-not $imports.ContainsKey($cur)) { $imports[$cur] = @() }; continue
            }
            if ($cur -and $line -match '^\s+[0-9A-Fa-f]+\s+([A-Za-z_][A-Za-z0-9_@]*)\s*$') { $imports[$cur] += $matches[1] }
          }

          # For each real DLL (skip api-set contracts), resolve the file the loader
          # would use and diff the exe's imported names against its export table.
          # Any import missing from the export table IS the STATUS_ENTRYPOINT_NOT_FOUND.
          foreach ($dll in ($imports.Keys | Sort-Object)) {
            if ($dll -like 'api-ms-*') { Write-Host "[skip api-set] $dll ($($imports[$dll].Count))"; continue }
            $path = (Get-Command $dll -ErrorAction SilentlyContinue).Source
            if (-not $path) { $path = Join-Path "$env:SystemRoot\System32" $dll }
            if (-not (Test-Path $path)) { Write-Host "########## MISSING DLL: $dll (not on system)"; continue }
            $exports = New-Object System.Collections.Generic.HashSet[string]
            foreach ($l in (& $dumpbin /exports $path)) {
              if ($l -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]{4,}\s+([A-Za-z_][A-Za-z0-9_@]*)') { [void]$exports.Add($matches[1]) }
            }
            $missing = $imports[$dll] | Where-Object { -not $exports.Contains($_) }
            if ($missing) {
              Write-Host "########## MISSING ENTRY POINTS in ${dll} -> ${path}:"
              $missing | ForEach-Object { Write-Host "    $dll!$_" }
            } else {
              Write-Host "[ok] $dll ($($imports[$dll].Count) imports / $($exports.Count) exports) -> $path"
            }
          }

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
