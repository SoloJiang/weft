name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin' || matrix.args == '--target x86_64-apple-darwin' && 'x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            protobuf-compiler
          protoc --version

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          protoc --version

      # winget is flaky on the hosted Windows runner: it mutates the registry
      # PATH, but Actions only honors $GITHUB_PATH between steps, so protoc often
      # isn't visible to the later build step and prost-build (used by
      # lark-websocket-protobuf via openlark's websocket feature) can't find it.
      # Install via the dedicated action instead — it works on every image and
      # adds protoc (with its include dir) to PATH. Mirrors ci.yml.
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify protoc (Windows)
        if: runner.os == 'Windows'
        run: protoc --version

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Tauri's DMG bundler can't add extra files to the disk image, so rebuild
      # it with create-dmg to drop in the "damaged" un-quarantine helper next to
      # the app, then replace the asset tauri-action already uploaded. The DMG is
      # not an updater artifact, so re-uploading it doesn't affect latest.json.
      - name: Repackage macOS DMG with the damaged-fix helper
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          ARGS: ${{ matrix.args }}
        run: |
          set -euo pipefail
          brew install create-dmg
          TRIPLE="${ARGS#--target }"
          BUNDLE="src-tauri/target/$TRIPLE/release/bundle"
          APP="$BUNDLE/macos/Weft.app"
          DMG="$(ls "$BUNDLE"/dmg/*.dmg | head -1)"
          echo "app: $APP"
          echo "dmg: $DMG"

          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          cp scripts/weft-macos-fix.command "$STAGE/打不开？双击修复.command"
          chmod +x "$STAGE/打不开？双击修复.command"

          # create-dmg drives Finder via AppleScript, which can flake on CI; retry.
          rm -f "$DMG"
          for attempt in 1 2 3; do
            if create-dmg \
              --volname "Weft" \
              --background "src-tauri/dmg/background.tiff" \
              --window-size 660 520 \
              --icon-size 96 \
              --text-size 13 \
              --icon "Weft.app" 170 195 \
              --app-drop-link 490 195 \
              --icon "打不开？双击修复.command" 330 412 \
              --no-internet-enable \
              "$DMG" "$STAGE"; then
              break
            fi
            echo "create-dmg attempt $attempt failed; retrying…"
            rm -f "$DMG"
            sleep 5
          done
          test -f "$DMG"

          gh release upload "$TAG" "$DMG" --repo "$REPO" --clobber

  merge-updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download release assets
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --dir ./assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json
        run: node .github/scripts/merge-updater-json.mjs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload latest.json
        run: gh release upload ${{ github.ref_name }} latest.json --repo ${{ github.repository }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS "damaged" fix helper
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x scripts/weft-macos-fix.command
          zip -j weft-macos-fix.command.zip scripts/weft-macos-fix.command
          gh release upload "$TAG" weft-macos-fix.command.zip --repo "$REPO" --clobber
